<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evento X - Detalhes</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .container {
            border: 1px solid #000;
            padding: 2rem;
            max-width: 800px;
            margin: 2rem auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .event-details {
            width: 60%;
            text-align: left;
        }
        .event-details h2 {
            margin-top: 0;
        }
        .event-description {
            color: rgb(0, 0, 0);
            margin-top: 1rem;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .buttons button {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid #000;
            background-color: #67706a;
        }
        .buttons button:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>
    <header>
        <h1>UniEvent - Detalhes do Evento</h1>
    </header>

    <main>
        <div class="container">
            <div class="event-details">
                <h2>Evento 1</h2>
                <p class="event-description">
                    <!-- Descrição aleatória sobre o evento -->
                    <!-- Exemplo 1 -->
                    Participe de um encontro incrível para celebrar a diversidade cultural e conhecer novas pessoas!
                </p>
            </div>
            <div class="buttons">
                <button onclick="participar()">Participar</button>
                <button onclick="voltar()">Voltar</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 UniEvent - Todos os direitos reservados</p>
    </footer>

    <script>
        function participar() {
            alert("Você está participando do evento!");
            // Aqui você poderia adicionar uma funcionalidade para inscrição real.
        }

        function voltar() {
            window.history.back();
        }
    </script>
</body>
</html>
